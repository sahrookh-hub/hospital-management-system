# ===========================
# Application
# ===========================
spring.application.name=Hospital Management System

# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_management_system
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# JWT
# ===========================
application.security.jwt.secret-key=8c7e52d1c3a9f7b4e8d6a1f9c2b5e7d38c7e52d1c3a9f7b4e8d6a1f9c2b5e7d3
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

# ===========================
# Swagger
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html